<!DOCTYPE html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><meta name='robots' content='noindex'><title>SF 2-4 Unit Shortlist</title><style>
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;margin:16px;background:#faf9f6;color:#1a1a1a;font-size:14px}
h1{font-size:20px;margin:0 0 4px}.sub{color:#777;font-size:12px;margin-bottom:14px}
.wrap{overflow-x:auto}table{border-collapse:collapse;background:#fff;min-width:1150px;width:100%}
th{background:#f5f3ef;font-size:10px;text-transform:uppercase;color:#888;text-align:left;padding:7px 8px;border-bottom:1px solid #e5e2dc;cursor:pointer;position:sticky;top:0}
td{padding:7px 8px;border-bottom:1px solid #f0ede8;vertical-align:top;white-space:nowrap}
td.mix{white-space:normal;max-width:220px;font-size:12px}
a{color:#b45309;text-decoration:none;font-weight:600}a:hover{text-decoration:underline}
.badge{font-size:9px;background:#f3e8dd;color:#8a5a1e;border-radius:4px;padding:1px 4px}
.mut{color:#999;font-size:11px}tr.dim td{opacity:.45}
</style></head><body>
<h1>San Francisco 2&ndash;4 Unit Shortlist</h1>
<div class='sub' id='sub'>Loading&hellip;</div>
<div class='wrap'><table><thead><tr id='hdr'></tr></thead><tbody id='tb'></tbody></table></div>
<script>
var U='https://hkndckjkwcgnhziikgvl.supabase.co/rest/v1/apartment_listings?county=eq.San%20Francisco&select=address,neighborhood,zip,tier,price,units,unit_mix,has_retail,cap_rate_est,median_income,crime_grade,listed_date,days_on_market,agent_name,agent_phone,broker,mls_id,url,docs_url,status,notes';
var K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbmRja2prd2Nnbmh6aWlrZ3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMDI3ODUsImV4cCI6MjA5ODY3ODc4NX0.JLQOTzAQVp73LVb-ZSgpXvfSDirPViCVpadn3zrWZ2w';
var rows=[];var sk='cap_rate_est';var sd=-1;
var COLS=[['address','Address'],['neighborhood','Neighborhood'],['tier','Tier'],['units','Type'],['unit_mix','Unit mix'],['price','Price'],['days_on_market','Listed'],['cap_rate_est','Cap est'],['median_income','Income'],['crime_grade','Crime'],['agent_name','Listing agent'],['notes','Notes']];
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function money(n){return n==null?'—':'$'+Number(n).toLocaleString()}
function ty(u){return u==2?'Duplex':u==3?'Triplex':u==4?'Fourplex':u?u+' units':'?'}
function dot(t){return t=='green'?'&#128994;':t=='yellow'?'&#128993;':t=='red'?'&#128308;':'&middot;'}
function render(){rows.sort(function(a,b){var x=a[sk],y=b[sk];if(x==null)return 1;if(y==null)return -1;var nx=+x,ny=+y;if(!isNaN(nx)&&!isNaN(ny))return (nx-ny)*sd;return String(x).localeCompare(String(y))*sd});
document.getElementById('tb').innerHTML=rows.map(function(x){return '<tr'+(x.units>=5?' class=dim':'')+'><td><a target=_blank href='+JSON.stringify(x.url||'#')+'>'+esc((x.address||'').replace(/, San Francisco.*/,''))+'</a>'+(x.status!='Active'?' <span class=badge>'+esc(x.status)+'</span>':'')+(x.docs_url?' <a target=_blank href='+JSON.stringify(x.docs_url)+'>[docs]</a>':'')+'</td><td>'+esc(x.neighborhood)+'</td><td>'+dot(x.tier)+'</td><td>'+ty(x.units)+(x.has_retail?' &#127978;':'')+'</td><td class=mix>'+esc(x.unit_mix||'—')+'</td><td>'+money(x.price)+'</td><td>'+(x.listed_date?esc(x.listed_date)+' ('+x.days_on_market+'d)':'—')+'</td><td>'+(x.cap_rate_est?x.cap_rate_est+'%':'—')+'</td><td>'+(x.median_income?'$'+Math.round(x.median_income/1000)+'k':'—')+'</td><td><a target=_blank href=https://crimegrade.org/safest-places-in-'+x.zip+'/>'+esc(x.crime_grade||'check')+'</a></td><td>'+esc(x.agent_name)+'<br><a href=tel:'+esc(x.agent_phone)+'>'+esc(x.agent_phone)+'</a><br><span class=mut>'+esc(x.broker)+' &middot; MLS '+esc(x.mls_id)+'</span></td><td class=mix>'+esc(x.notes||'')+'</td></tr>'}).join('')}
document.getElementById('hdr').innerHTML=COLS.map(function(c){return '<th data-k='+c[0]+'>'+c[1]+'</th>'}).join('');
document.getElementById('hdr').addEventListener('click',function(e){var k=e.target.getAttribute('data-k');if(!k)return;sd=(sk==k)?-sd:-1;sk=k;render()});
fetch(U,{headers:{apikey:K,Authorization:'Bearer '+K}}).then(function(r){return r.json()}).then(function(d){rows=d;document.getElementById('sub').innerHTML=d.length+' listings &middot; $1M&ndash;$1.5M &middot; live from Medi&#39;s tracker &middot; cap rates are screening estimates &middot; &#127978; = ground-floor retail &middot; greyed = 5+ units (fail residential financing) &middot; click headers to sort';render()}).catch(function(e){document.getElementById('sub').textContent='Failed to load: '+e.message});
</script></body></html>
