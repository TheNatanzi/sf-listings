function ic(dom,u,name){var img='<img class="pic'+(u?'':' off')+'" src="https://www.google.com/s2/favicons?domain='+dom+'&sz=32" alt="'+name+'" title="'+(u?'View on '+name:'Not listed on '+name)+'">';return u?'<a target=_blank href='+JSON.stringify(u)+'>'+img+'</a>':img}
function comps(x){var u='https://www.redfin.com/zipcode/'+x.zip+'/filter/property-type=multifamily,include=sold-1yr';var d=(x.ppsf&&x.zip_median_ppsf)?Math.round((x.ppsf-x.zip_median_ppsf)/x.zip_median_ppsf*100):null;var lbl=x.ppsf?('$'+x.ppsf+'/sf'+(d===null?'':d===0?' (=ZIP)':' ('+(d>0?'+':'')+d+'%)')):'view solds';return '<a target=_blank href='+JSON.stringify(u)+' title="Asking $/sf vs median of tracked listings in ZIP '+x.zip+'. Click for actual SOLD multifamily comps (Redfin, last 12mo)."'+(d!=null&&d<=-5?' style="color:#1e7c36"':d!=null&&d>=15?' style="color:#b3413d"':'')+'>'+lbl+'</a>'}
function icons(x){var z=(x.url&&x.url.indexOf('zillow')!==-1)?x.url:null;var r=x.redfin_url||((x.url&&x.url.indexOf('redfin')!==-1)?x.url:null);var h='https://www.google.com/search?btnI=1&q='+encodeURIComponent('site:homes.com '+x.address.split(',')[0]+' San Francisco');return ic('zillow.com',z,'Zillow')+ic('redfin.com',r,'Redfin')+ic('crexi.com',x.docs_url,'Crexi')+ic('loopnet.com',x.loopnet_url,'LoopNet')+ic('homes.com',h,'Homes.com (finds the listing via search)')}
function sub(extra){document.getElementById('sub').innerHTML=rows.length+' listings &middot; $1M&ndash;$1.5M &middot; '+extra+' &middot; cap rates are screening estimates &middot; &#127978; = ground-floor retail &middot; greyed = 5+ units (fail residential financing) &middot; click headers to sort'}
function render(){rows.sort(function(a,b){var x=a[sk],y=b[sk];if(x==null)return 1;if(y==null)return -1;var nx=+x,ny=+y;if(!isNaN(nx)&&!isNaN(ny))return (nx-ny)*sd;return String(x).localeCompare(String(y))*sd});
document.getElementById('tb').innerHTML=rows.map(function(x){return '<tr'+(x.units>=5?' class=dim':'')+'><td>'+esc((x.address||'').replace(/, San Francisco.*/,''))+(x.status!='Active'?' <span class=badge>'+esc(x.status)+'</span>':'')+icons(x)+'</td><td>'+esc(x.neighborhood)+'</td><td>'+dot(x.tier)+'</td><td>'+ty(x.units)+(x.has_retail?' &#127978;':'')+'</td><td class=mix>'+esc(x.unit_mix||'—')+'</td><td>'+money(x.price)+'</td><td>'+comps(x)+'</td><td>'+money(x.est_monthly_rent)+'</td><td>'+money(x.noi_est)+'</td><td>'+(x.units_vacant==null?'?':x.units_vacant+(x.vacant_rent_est?' ('+money(x.vacant_rent_est)+'/mo)':''))+'</td><td>'+(x.listed_date?esc(x.listed_date)+' ('+x.days_on_market+'d)':'—')+'</td><td>'+(x.cap_rate_est?x.cap_rate_est+'%':'—')+'</td><td>'+(x.median_income?'$'+Math.round(x.median_income/1000)+'k':'—')+'</td><td><a target=_blank href=https://crimegrade.org/safest-places-in-'+x.zip+'/>'+esc(x.crime_grade||'check')+'</a></td><td>'+esc(x.agent_name)+'<br><a href=tel:'+esc(x.agent_phone)+'>'+esc(x.agent_phone)+'</a><br><span class=mut>'+esc(x.broker)+' &middot; MLS '+esc(x.mls_id)+'</span></td><td class=mix>'+esc(x.notes||'')+'</td></tr>'}).join('')}
document.getElementById('hdr').innerHTML=COLS.map(function(c){return '<th data-k='+c[0]+'>'+c[1]+'</th>'}).join('');
